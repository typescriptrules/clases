<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
</head>
<body>
<div style="max-width: 800px; margin: 2rem auto; font-family: sans-serif;">

    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
        <select id="method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
        </select>

        <input
                type="text"
                id="endpoint"
                placeholder="http://localhost:3001/users"
                style="flex: 1; padding: 0.4rem;"
        />

        <button id="sendBtn">Send</button>
    </div>

    <!-- Request body -->
    <textarea id="bodyInput" placeholder='{"name": "John"}'
              style="width: 100%; height: 120px; padding: 0.5rem; margin-bottom: 1rem; font-family: monospace; display: none;">
    </textarea>

    <!-- Response -->
    <pre id="response" style="
      background: #111;
      color: #0f0;
      padding: 1rem;
      border-radius: 6px;
      max-height: 400px;
      overflow: auto;
      font-size: 14px;
    ">Response will appear here...</pre>
</div>

<script type="module" src="./main.ts"></script>
</body>
</html>
